name: Prepare Release Version

on:
  pull_request:
    types: [ labeled, opened, synchronize ]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process'
        required: true
        type: number

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prepare-version:
    # Trigger if target is main AND source is a release or hotfix branch
    if: |
      github.base_ref == 'main' &&
      (startsWith(github.head_ref, 'release/') || startsWith(github.head_ref, 'hotfix/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }} # Check out the release/hotfix branch
          fetch-depth: 0 # Full history to compare with base branch

      - name: Update Version based on Labels
        id: update
        run: |
          if [ ! -f version.properties ]; then
            echo "âťŚ Error: version.properties file not found."
            exit 1
          fi

          MAJOR=$(grep '^versionMajor=' version.properties | cut -d'=' -f2)
          MINOR=$(grep '^versionMinor=' version.properties | cut -d'=' -f2)
          PATCH=$(grep '^versionPatch=' version.properties | cut -d'=' -f2)

          # Validate that MAJOR, MINOR, and PATCH are present and valid integers
          if [ -z "$MAJOR" ]; then
            echo "âťŚ Error: versionMajor is missing in version.properties."
            exit 1
          elif ! [[ "$MAJOR" =~ ^[0-9]+$ ]]; then
            echo "âťŚ Error: versionMajor is not a valid integer in version.properties."
            exit 1
          fi
          if [ -z "$MINOR" ]; then
            echo "âťŚ Error: versionMinor is missing in version.properties."
            exit 1
          elif ! [[ "$MINOR" =~ ^[0-9]+$ ]]; then
            echo "âťŚ Error: versionMinor is not a valid integer in version.properties."
            exit 1
          fi
          if [ -z "$PATCH" ]; then
            echo "âťŚ Error: versionPatch is missing in version.properties."
            exit 1
          elif ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "âťŚ Error: versionPatch is not a valid integer in version.properties."
            exit 1
          fi

          echo "Current version: $MAJOR.$MINOR.$PATCH"

          IS_MAJOR=${{ contains(github.event.pull_request.labels.*.name, 'major') }}
          IS_HOTFIX=${{ startsWith(github.head_ref, 'hotfix/') }}

          if [ "$IS_MAJOR" == "true" ]; then
            echo "đź”Ą Major release detected!"
            NEW_MAJOR=$((MAJOR + 1))
            NEW_MINOR=0
            NEW_PATCH=0

            sed -i "s/^versionMajor=.*/versionMajor=$NEW_MAJOR/" version.properties
            sed -i "s/^versionMinor=.*/versionMinor=$NEW_MINOR/" version.properties
            sed -i "s/^versionPatch=.*/versionPatch=$NEW_PATCH/" version.properties

          elif [ "$IS_HOTFIX" == "true" ]; then
            echo "đźš‘ Hotfix branch detected."

            # Read authoritative version from main (hotfixes always patch the production version)
            BASE_MAJOR=$(git show origin/main:version.properties | grep '^versionMajor=' | cut -d'=' -f2)
            BASE_MINOR=$(git show origin/main:version.properties | grep '^versionMinor=' | cut -d'=' -f2)
            BASE_PATCH=$(git show origin/main:version.properties | grep '^versionPatch=' | cut -d'=' -f2)

            # Validate values read from origin/main
            if [ -z "$BASE_MAJOR" ] || [ -z "$BASE_MINOR" ] || [ -z "$BASE_PATCH" ]; then
              echo "âťŚ Error: Could not read version from origin/main:version.properties."
              echo "   BASE_MAJOR='$BASE_MAJOR' BASE_MINOR='$BASE_MINOR' BASE_PATCH='$BASE_PATCH'"
              exit 1
            fi
            if ! [[ "$BASE_MAJOR" =~ ^[0-9]+$ ]] || ! [[ "$BASE_MINOR" =~ ^[0-9]+$ ]] || ! [[ "$BASE_PATCH" =~ ^[0-9]+$ ]]; then
              echo "âťŚ Error: origin/main version contains non-integer values."
              echo "   BASE_MAJOR='$BASE_MAJOR' BASE_MINOR='$BASE_MINOR' BASE_PATCH='$BASE_PATCH'"
              exit 1
            fi

            echo "Main version: $BASE_MAJOR.$BASE_MINOR.$BASE_PATCH"

            # Align MAJOR.MINOR.PATCH to main if the branch diverges (defensive â€” handles
            # branches accidentally created from develop instead of main)
            if [ "$MAJOR" -ne "$BASE_MAJOR" ] || [ "$MINOR" -ne "$BASE_MINOR" ]; then
              echo "âš ď¸Ź Branch version ($MAJOR.$MINOR.$PATCH) differs from main ($BASE_MAJOR.$BASE_MINOR.$BASE_PATCH). Aligning to main."
              sed -i "s/^versionMajor=.*/versionMajor=$BASE_MAJOR/" version.properties
              sed -i "s/^versionMinor=.*/versionMinor=$BASE_MINOR/" version.properties
              sed -i "s/^versionPatch=.*/versionPatch=$BASE_PATCH/" version.properties
              MAJOR=$BASE_MAJOR
              MINOR=$BASE_MINOR
              PATCH=$BASE_PATCH
            fi

            # Idempotency: only bump PATCH if not already ahead of main
            if [ "$PATCH" -gt "$BASE_PATCH" ]; then
              echo "â„ąď¸Ź Hotfix version already bumped ($MAJOR.$MINOR.$PATCH > base $BASE_MAJOR.$BASE_MINOR.$BASE_PATCH). Skipping increment."
            else
              NEW_PATCH=$((BASE_PATCH + 1))
              echo "đź”§ Bumping patch: $BASE_PATCH â†’ $NEW_PATCH"
              sed -i "s/^versionPatch=.*/versionPatch=$NEW_PATCH/" version.properties
            fi
          else
            echo "đźš€ Standard release (Keeping current Major/Minor)"
          fi

          # Always remove snapshot for release
          sed -i 's/^versionSnapshot=.*/versionSnapshot=false/' version.properties

          echo "âś… Version prepared."
          cat version.properties

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: prepare release version [skip ci]"
          file_pattern: version.properties
