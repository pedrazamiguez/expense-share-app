name: Build and Test Android App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Code Formatting Check (Ktlint)
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run Static Code Analysis (Detekt)
        run: ./gradlew detekt --no-daemon

      - name: Publish Detekt Results
        if: always()
        uses: jwgmeligmeyling/checkstyle-github-action@v1
        with:
          name: Code Analysis
          title: Detekt Report
          path: '**/build/reports/detekt/detekt.xml'

      - name: Generate Detekt Summary
        if: always()
        run: |
          echo "## 🔍 Detekt — Static Code Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL_SMELLS=0
          TOTAL_LOC=0
          TOTAL_FILES=0
          MODULE_ROWS=""

          for md_file in $(find . -path "*/build/reports/detekt/detekt.md" -type f | sort); do
            MODULE=$(echo "$md_file" | sed 's|^\./||;s|/build/reports/detekt/detekt.md||' | sed 's|/|:|g')
            MODULE=":${MODULE}"

            LOC=$(grep -oP '\* \K[0-9,]+(?= lines of code)' "$md_file" 2>/dev/null | tr -d ',' || echo "0")
            SLOC=$(grep -oP '\* \K[0-9,]+(?= source lines of code)' "$md_file" 2>/dev/null | tr -d ',' || echo "0")
            COMPLEXITY=$(grep -oP '\* \K[0-9,]+(?= cognitive complexity)' "$md_file" 2>/dev/null | tr -d ',' || echo "0")
            SMELLS=$(grep -oP '## Findings \(\K[0-9]+' "$md_file" 2>/dev/null || echo "0")
            FILES=$(grep -oP '\* \K[0-9,]+(?= number of kt files)' "$md_file" 2>/dev/null | tr -d ',' || echo "0")

            if [ "$LOC" != "0" ] || [ "$FILES" != "0" ]; then
              ICON="✅"
              [ "$SMELLS" -gt 0 ] 2>/dev/null && ICON="⚠️"
              MODULE_ROWS="${MODULE_ROWS}| ${MODULE} | ${FILES} | ${SLOC} | ${COMPLEXITY} | ${ICON} ${SMELLS} |\n"
              TOTAL_SMELLS=$((TOTAL_SMELLS + SMELLS))
              TOTAL_LOC=$((TOTAL_LOC + ${LOC:-0}))
              TOTAL_FILES=$((TOTAL_FILES + ${FILES:-0}))
            fi
          done

          if [ "$TOTAL_SMELLS" -eq 0 ]; then
            echo "✅ **No code smells detected** across ${TOTAL_FILES} files (${TOTAL_LOC} lines of code)." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **${TOTAL_SMELLS} code smell(s) detected** across ${TOTAL_FILES} files (${TOTAL_LOC} lines of code)." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📊 Module breakdown</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Files | SLOC | Cognitive Complexity | Findings |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------:|-----:|---------------------:|---------:|" >> $GITHUB_STEP_SUMMARY
          printf "$MODULE_ROWS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Lint, Test, and Build
        run: ./gradlew lintDebug testDebugUnitTest assembleDebug

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/build/test-results/testDebugUnitTest/TEST-*.xml

      - name: Upload debug APK
        if: |
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Test Reports
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/testDebugUnitTest/**/*.html

      - name: Upload Detekt Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/detekt.html

      - name: Upload Ktlint Reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ktlint-reports
          path: |
            **/build/reports/ktlint/**/*.txt

