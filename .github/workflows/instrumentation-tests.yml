name: Instrumentation Tests

on:
  # Run on pushes to main (e.g., after a PR merge / release prep)
  push:
    branches: [ main ]

  # Allow manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      api-level:
        description: 'Android API level for the emulator'
        required: false
        default: '30'
        type: choice
        options:
          - '30'
          - '31'
          - '33'
          - '34'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumentation_tests:
    name: Instrumentation Tests (API ${{ inputs.api-level || '30' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    timeout-minutes: 45

    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      FIREBASE_APP_CHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Enable KVM for hardware acceleration on Linux runners
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Build the app and test APKs before starting the emulator
      - name: Build debug APK and test APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level || '30' }}
          arch: x86_64
          profile: pixel_6
          heap-size: 512M
          ram-size: 4096M
          disk-size: 8G
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          script: |
            # Run tests (capture exit code so we still pull screenshots on failure)
            TEST_EXIT=0
            ./gradlew connectedDebugAndroidTest --no-daemon || TEST_EXIT=$?

            # Pull screenshots from the emulator (adb is only available here)
            echo "Pulling screenshots from emulator..."
            adb pull /storage/emulated/0/Android/data/es.pedrazamiguez.splittrip/files/screenshots/ ./screenshots/ || echo "No screenshots found on device"

            # Propagate the original test exit code
            exit $TEST_EXIT

      - name: Generate screenshot summary
        if: always()
        run: |
          chmod +x ./scripts/generate-screenshot-summary.sh
          ./scripts/generate-screenshot-summary.sh ./screenshots

      - name: Publish instrumentation test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/build/outputs/androidTest-results/connected/debug/TEST-*.xml

      - name: Upload instrumentation test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumentation-test-reports
          path: |
            **/build/reports/androidTests/connected/debug/**
          retention-days: 14

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-screenshots
          path: ./screenshots/
          retention-days: 14

