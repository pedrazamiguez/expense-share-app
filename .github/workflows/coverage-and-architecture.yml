name: Coverage and Architecture

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  konsist:
    name: Konsist (Architecture Rules)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      actions: read
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Konsist Architecture Tests
        run: ./gradlew :konsist-tests:test

      - name: Publish Konsist Architecture Test Results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Konsist Architecture Tests
          path: konsist-tests/build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Konsist test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: konsist-test-results
          path: |
            konsist-tests/build/reports/tests/test/**

  jacoco:
    name: JaCoCo (Code Coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests and generate JaCoCo merged report
        run: ./gradlew testDebugUnitTest :domain:test jacocoMergedReport

      - name: Generate JaCoCo Coverage Report
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'EOF'
          import os, json, re, glob, urllib.request
          import xml.etree.ElementTree as ET

          pr_number = os.environ.get("PR_NUMBER", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          token = os.environ.get("GITHUB_TOKEN", "")
          workspace = os.environ.get("GITHUB_WORKSPACE", "")

          def strip_doctype(s):
              return re.sub(r'<!DOCTYPE[^>]*>', '', s)

          def counter(elem, t):
              for c in elem.findall(f"counter[@type='{t}']"):
                  missed = int(c.get("missed", 0))
                  covered = int(c.get("covered", 0))
                  total = missed + covered
                  return (covered / total * 100, covered, total) if total else (0.0, 0, 0)
              return None, None, None

          def badge(p):
              if p is None: return "—"
              return ("🟢" if p >= 80 else "🟡" if p >= 60 else "🔴") + f" **{p:.1f}%**"

          # 1. Overall from merged report
          overall_md = ""
          merged = "build/reports/jacoco/merged/jacocoMergedReport.xml"
          if os.path.exists(merged):
              root = ET.fromstring(strip_doctype(open(merged).read()))
              rows = []
              for t in ["INSTRUCTION", "LINE", "BRANCH", "METHOD"]:
                  pct, cov, tot = counter(root, t)
                  if tot: rows.append(f"| {t.capitalize()} | {badge(pct)} | {cov:,} / {tot:,} |")
              if rows:
                  overall_md = "| Type | Coverage | Covered / Total |\n|---|---:|---:|\n" + "\n".join(rows) + "\n"

          # 2. Per-module breakdown + zero-coverage files
          xml_files = sorted(glob.glob("**/build/reports/jacoco/jacocoTestReport.xml", recursive=True))
          module_data = []
          zero_files = []
          for xp in xml_files:
              parts = xp.replace("\\", "/").split("/")
              try: bi = parts.index("build")
              except ValueError: continue
              mod = ":" + ":".join(parts[:bi])
              try:
                  root = ET.fromstring(strip_doctype(open(xp).read()))
                  l_pct, _, _ = counter(root, "LINE")
                  b_pct, _, _ = counter(root, "BRANCH")
                  i_pct, _, _ = counter(root, "INSTRUCTION")
                  if l_pct is not None: module_data.append((mod, l_pct, b_pct, i_pct))
                  for sf in root.iter("sourcefile"):
                      fname = sf.get("name", "")
                      if not fname.endswith(".kt"): continue
                      _, cov, tot = counter(sf, "LINE")
                      if tot and cov == 0: zero_files.append((mod, fname))
              except Exception as e: print(f"Warning {xp}: {e}")

          module_data.sort(key=lambda x: x[1])
          per_module_md = ""
          if module_data:
              rows = [f"| `{m}` | {badge(l)} | {badge(b)} | {badge(i)} |" for m, l, b, i in module_data]
              per_module_md = "| Module | Line | Branch | Instruction |\n|---|---:|---:|---:|\n" + "\n".join(rows) + "\n"

          zero_md = ""
          if zero_files:
              z_rows = [f"| `{m}` | `{f}` |" for m, f in zero_files[:20]]
              if len(zero_files) > 20: z_rows.append(f"| — | _and {len(zero_files)-20} more_ |")
              zero_md = "| Module | File |\n|---|---|\n" + "\n".join(z_rows) + "\n"

          # 3. Changed files (PRs only — queries GitHub API)
          changed_md = ""
          if pr_number and repo and token:
              changed_kt = {}
              try:
                  url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100"
                  req = urllib.request.Request(url, headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28"
                  })
                  with urllib.request.urlopen(req) as resp:
                      pr_files = json.loads(resp.read())
                  changed_kt = {
                      f["filename"].split("/")[-1]: f["filename"]
                      for f in pr_files
                      if f["filename"].endswith(".kt") and f.get("status") != "removed"
                  }
              except Exception as e: print(f"Warning fetching PR files: {e}")
              if changed_kt:
                  lkp = {}
                  for xp in xml_files:
                      try:
                          root = ET.fromstring(strip_doctype(open(xp).read()))
                          for sf in root.iter("sourcefile"):
                              fname = sf.get("name", "")
                              if fname in changed_kt and fname not in lkp:
                                  l_pct, l_cov, l_tot = counter(sf, "LINE")
                                  b_pct, _, _ = counter(sf, "BRANCH")
                                  lkp[fname] = (l_pct, b_pct, l_cov, l_tot)
                      except Exception: pass
                  rows = []
                  for kf, full in sorted(changed_kt.items()):
                      if kf in lkp:
                          lp, bp, lc, lt = lkp[kf]
                          rows.append((lp if lp is not None else -1,
                              f"| `{full}` | {badge(lp)} | {badge(bp)} | {lc}/{lt} |"))
                      else:
                          rows.append((-1, f"| `{full}` | _(no data — not exercised by tests)_ | — | — |"))
                  rows.sort(key=lambda x: x[0])
                  if rows:
                      changed_md = "| File | Line | Branch | Lines Covered |\n|---|---:|---:|---:|\n"
                      changed_md += "\n".join(r for _, r in rows) + "\n"

          # Assemble
          md = "## 📊 JaCoCo Code Coverage\n\n"
          if overall_md: md += "### Overall\n\n" + overall_md + "\n"
          if changed_md: md += "### Changed Files in This PR\n\n" + changed_md + "\n"
          if per_module_md: md += "### Per-Module Breakdown _(worst → best line coverage)_\n\n" + per_module_md + "\n"
          if zero_md:
              md += f"<details><summary>⛔ {len(zero_files)} file(s) with 0% line coverage</summary>\n\n" + zero_md + "\n</details>\n"
          if not overall_md and not per_module_md:
              md += "_No coverage data found — tests may have failed._\n"

          sf = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if sf:
              with open(sf, "a") as fh: fh.write(md)
          with open("/tmp/jacoco_summary.md", "w") as fh: fh.write(md)
          print(md)
          EOF

      - name: Post JaCoCo coverage comment on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- jacoco-coverage-report -->';
            let summary;
            try {
              summary = fs.readFileSync('/tmp/jacoco_summary.md', 'utf8');
            } catch (e) {
              summary = '## 📊 JaCoCo Coverage\n\nCould not read coverage report.\n';
            }
            const body = marker + '\n' + summary;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-reports
          path: |
            build/reports/jacoco/merged/**

