name: Coverage and Architecture

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  konsist:
    name: Konsist (Architecture Rules)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      actions: read
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Konsist Architecture Tests
        run: ./gradlew :konsist-tests:test

      - name: Publish Konsist Architecture Test Results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Konsist Architecture Tests
          path: konsist-tests/build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Konsist test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: konsist-test-results
          path: |
            konsist-tests/build/reports/tests/test/**

  jacoco:
    name: JaCoCo (Code Coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests and generate JaCoCo merged report
        run: ./gradlew testDebugUnitTest :domain:test jacocoMergedReport


      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-reports
          path: |
            build/reports/jacoco/merged/**

  sonar:
    name: SonarQube Analysis
    # SonarQube CE 9.9 does not support PR decoration (inline comments on diffs) — that
    # requires Developer Edition+. However, the scanner CAN still run on PR code and the
    # Quality Gate result will pass/fail the CI check, which is what gates the merge.
    # Trade-off: CE has a single project baseline, so concurrent PR analyses may
    # temporarily overwrite each other's dashboard state. The next push to develop/main
    # always restores the authoritative baseline.
    runs-on: ubuntu-latest
    needs: [jacoco]
    permissions:
      contents: read
      actions: read
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history required by SonarQube for blame information and accurate
          # new-code detection (identifying issues introduced in a given PR/push).
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Download JaCoCo merged report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-coverage-reports
          path: build/reports/jacoco/merged/

      - name: Run SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # --no-configuration-cache: SonarScanner is incompatible with Gradle config cache.
        # -Dsonar.qualitygate.wait=true: scanner polls SonarQube after analysis until the
        # Quality Gate result is ready, then exits non-zero if the gate fails.
        # -Dsonar.qualitygate.timeout=300: wait up to 5 minutes for QG computation.
        run: >-
          ./gradlew sonar
          -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=300
          --no-configuration-cache
