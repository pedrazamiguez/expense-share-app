name: Coverage and Architecture

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  konsist:
    name: Konsist (Architecture Rules)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      actions: read
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Konsist Architecture Tests
        run: ./gradlew :konsist-tests:test

      - name: Publish Konsist Architecture Test Results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Konsist Architecture Tests
          path: konsist-tests/build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Konsist test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: konsist-test-results
          path: |
            konsist-tests/build/reports/tests/test/**

  jacoco:
    name: JaCoCo (Code Coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests and generate JaCoCo merged report
        run: ./gradlew testDebugUnitTest :domain:test jacocoMergedReport

      - name: Add JaCoCo coverage report to PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: madrapps/jacoco-report@v1.6.9
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/merged/jacocoMergedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: 📊 JaCoCo Code Coverage
          update-comment: true
          pass-emoji: 🟢
          fail-emoji: 🔴

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-reports
          path: |
            build/reports/jacoco/merged/**

