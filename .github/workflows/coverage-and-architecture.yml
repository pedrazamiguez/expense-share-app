name: Coverage and Architecture

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  konsist:
    name: Konsist (Architecture Rules)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      actions: read
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Konsist Architecture Tests
        run: ./gradlew :konsist-tests:test

      - name: Publish Konsist Architecture Test Results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Konsist Architecture Tests
          path: konsist-tests/build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Konsist test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: konsist-test-results
          path: |
            konsist-tests/build/reports/tests/test/**

  jacoco:
    name: JaCoCo (Code Coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests and generate JaCoCo merged report
        run: ./gradlew testDebugUnitTest :domain:test jacocoMergedReport

      - name: Generate JaCoCo Step Summary
        if: always()
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, re

          xml_file = "build/reports/jacoco/merged/jacocoMergedReport.xml"
          if not os.path.exists(xml_file):
              md = "## 📊 JaCoCo Coverage\n\nNo coverage report was generated (tests may have failed).\n"
          else:
              with open(xml_file, "r", encoding="utf-8") as f:
                  content = f.read()
              # Remove DOCTYPE to avoid DTD resolution errors in Python's xml parser
              content = re.sub(r'<!DOCTYPE[^>]*>', '', content)
              root = ET.fromstring(content)

              def get_pct(element, counter_type):
                  for c in element.findall(f"counter[@type='{counter_type}']"):
                      missed = int(c.get("missed", 0))
                      covered = int(c.get("covered", 0))
                      total = missed + covered
                      return (covered / total * 100, covered, total) if total else (0.0, 0, 0)
                  return None, None, None

              def badge(p):
                  return "🟢" if p >= 80 else ("🟡" if p >= 60 else "🔴")

              md = "## 📊 JaCoCo Code Coverage\n\n"
              md += "| Type | Coverage | Covered / Total |\n"
              md += "|---|---:|---:|\n"
              for t in ["INSTRUCTION", "LINE", "BRANCH", "METHOD"]:
                  pct, covered, total = get_pct(root, t)
                  if total:
                      md += f"| {t.capitalize()} | {badge(pct)} **{pct:.1f}%** | {covered:,} / {total:,} |\n"

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary_file:
              with open(summary_file, "a") as fh:
                  fh.write(md)

          with open("/tmp/jacoco_summary.md", "w") as fh:
              fh.write(md)

          print(md)
          EOF

      - name: Post JaCoCo coverage comment on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- jacoco-coverage-report -->';
            let summary;
            try {
              summary = fs.readFileSync('/tmp/jacoco_summary.md', 'utf8');
            } catch (e) {
              summary = '## 📊 JaCoCo Coverage\n\nCould not read coverage report.\n';
            }
            const body = marker + '\n' + summary;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-reports
          path: |
            build/reports/jacoco/merged/**

