name: Static Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ktlint:
    name: Ktlint (Formatting)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Ktlint Check
        run: ./gradlew ktlintCheck

  detekt:
    name: Detekt (Code Quality)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/google-services.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Detekt with SARIF output
        run: ./gradlew detekt --continue

      - name: Merge Detekt SARIF reports
        if: always()
        run: |
          python3 - <<'EOF'
          import json, glob, os

          sarif_files = glob.glob("**/build/reports/detekt/*.sarif", recursive=True)
          if not sarif_files:
              print("No SARIF files found")
              exit(0)

          merged = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": []
          }

          for f in sorted(sarif_files):
              print(f"Processing: {f}")
              with open(f) as fh:
                  data = json.load(fh)
                  merged["runs"].extend(data.get("runs", []))

          os.makedirs("build/reports/detekt", exist_ok=True)
          with open("build/reports/detekt/merged.sarif", "w") as fh:
              json.dump(merged, fh, indent=2)

          total_results = sum(len(run.get("results", [])) for run in merged["runs"])
          print(f"Merged {len(sarif_files)} SARIF files — {total_results} total findings")
          EOF

      - name: Upload Detekt SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/detekt/merged.sarif
          category: "/tool:detekt"
          wait-for-processing: true

      - name: Upload Detekt reports (HTML + SARIF)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/**

